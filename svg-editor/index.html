<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SVG Structure Editor</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <header id="toolbar">
    <div class="toolbar-group modes">
      <button class="mode-btn active" data-mode="select" title="Select (S)">Select</button>
      <button class="mode-btn" data-mode="draw" title="Draw (D)">Draw</button>
    </div>
    <div class="toolbar-group actions">
      <button id="btn-new" title="New document">New</button>
      <button id="btn-load" title="Load SVG file">Load</button>
      <button id="btn-paste" title="Paste SVG source">Paste</button>
      <button id="btn-export" title="Copy SVG to clipboard">Copy SVG</button>
      <button id="btn-download" title="Download SVG file">Download</button>
    </div>
    <div class="toolbar-group view">
      <button id="btn-fit" title="Fit view (F)">Fit</button>
      <button id="btn-underlay" title="Underlay image">Underlay</button>
      <button id="btn-delete" title="Delete selected node (Del)" class="danger">Delete</button>
    </div>
    <input id="file-input" type="file" accept=".svg" hidden>
  </header>

  <main id="layout">
    <aside id="tree-panel">
      <div class="panel-header">
        <span>Structure</span>
        <div class="tree-actions">
          <select id="add-tag-select" title="Element to add">
            <option value="g">g</option>
            <option value="path">path</option>
            <option value="rect">rect</option>
            <option value="circle">circle</option>
            <option value="ellipse">ellipse</option>
            <option value="line">line</option>
            <option value="polyline">polyline</option>
            <option value="polygon">polygon</option>
            <option value="text">text</option>
            <option value="use">use</option>
            <option value="defs">defs</option>
            <option value="symbol">symbol</option>
            <option value="style">style</option>
          </select>
          <button id="btn-add-node" title="Add child element">+</button>
          <button id="btn-move-up" title="Move node up">↑</button>
          <button id="btn-move-down" title="Move node down">↓</button>
        </div>
      </div>
      <div id="tree-root"></div>
    </aside>

    <div id="canvas-area">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <image id="underlay-img" opacity="0.4" style="pointer-events:none" preserveAspectRatio="xMidYMid meet"/>
        <g id="doc"></g>
        <g id="overlay" style="pointer-events:none">
          <rect id="sel-box" class="sel-box" style="display:none" fill="none"/>
          <g id="path-handles"></g>
        </g>
      </svg>
      <div id="coords"></div>
      <div id="draw-hint" hidden>Click to add points · Right-click or Esc to finish</div>
    </div>

    <aside id="attr-panel">
      <div class="panel-header">
        <span>Attributes</span>
        <span id="attr-node-tag" class="tag-label"></span>
        <div class="tree-actions" id="cmd-add-row" hidden>
          <select id="new-cmd-type">
            <option>M</option><option>m</option>
            <option>L</option><option>l</option>
            <option>H</option><option>h</option>
            <option>V</option><option>v</option>
            <option>C</option><option>c</option>
            <option>Q</option><option>q</option>
            <option>S</option><option>s</option>
            <option>T</option><option>t</option>
            <option>A</option><option>a</option>
            <option>Z</option><option>z</option>
          </select>
          <button id="btn-add-cmd" title="Append command">+</button>
        </div>
      </div>
      <div id="attr-list"></div>
      <div id="attr-add-row">
        <input id="attr-new-name" placeholder="name" spellcheck="false">
        <input id="attr-new-val" placeholder="value" spellcheck="false">
        <button id="btn-add-attr" title="Add attribute">+</button>
      </div>
    </aside>
  </main>

  <!-- Underlay dialog -->
  <dialog id="underlay-dialog">
    <h2>Underlay Image</h2>
    <label>Image<br><input id="underlay-file" type="file" accept="image/*"></label>
    <label>Opacity
      <input id="underlay-opacity" type="range" min="0" max="1" step="0.05" value="0.4">
      <span id="underlay-opacity-val">0.40</span>
    </label>
    <label><input id="underlay-include" type="checkbox"> Include in export</label>
    <div class="dialog-actions">
      <button id="btn-clear-underlay">Clear</button>
      <button id="btn-underlay-done">Done</button>
    </div>
  </dialog>

  <!-- Paste dialog -->
  <dialog id="paste-dialog">
    <h2>Paste SVG Source</h2>
    <textarea id="paste-area" placeholder="Paste SVG markup here..." spellcheck="false"></textarea>
    <div class="dialog-actions">
      <button id="btn-paste-cancel">Cancel</button>
      <button id="btn-paste-ok">Load</button>
    </div>
  </dialog>

  <script type="module" src="src/main.js"></script>
</body>
</html>
