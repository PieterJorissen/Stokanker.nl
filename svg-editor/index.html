<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SVG Editor</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <header id="toolbar">
    <label class="btn" title="Load SVG file">
      Load <input type="file" accept=".svg" id="file-input">
    </label>
    <button id="btn-export">Export</button>
    <button id="btn-fit" title="Fit view (F)">Fit</button>
    <button id="btn-delete" class="danger" title="Delete selected (Del)">Delete</button>
  </header>

  <main id="layout">
    <aside id="tree-panel">
      <div id="tree-root"></div>
    </aside>

    <div id="canvas-area">
      <svg id="svg-root" xmlns="http://www.w3.org/2000/svg">
        <g id="doc"></g>
      </svg>
      <canvas id="overlay"></canvas>
    </div>
  </main>

  <!-- Model: hidden custom element tree that drives the SVG above -->
  <div id="model" hidden>
    <svg-document viewBox="0 0 800 600"></svg-document>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
