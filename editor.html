<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <title>editor — stokanker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0f08; touch-action: none; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
<iframe id="frame" src="index.html"></iframe>
<script>
const BUILDINGS = [
  'underlay',
  'drijvende-bok','pontoon','electric-crane','portal-crane',
  'fabriek','romney-loods','werkplaats','ons-huis',
  'schuur-complex','boomgaard','smalspoor-cart'
];

const RANGES = { x: [-400, 1800], y: [-400, 1300], w: [5, 1400], h: [2, 900] };

const frame = document.getElementById('frame');
let doc, svg;
let selected = null, origBox = null, selRect = null;
let arLocked = false, arRatio = null;

// ── viewBox state ──────────────────────────
let vb = { x: 0, y: 0, w: 1400, h: 900 };
function setVB() {
  svg.setAttribute('viewBox', `${vb.x.toFixed(1)} ${vb.y.toFixed(1)} ${vb.w.toFixed(1)} ${vb.h.toFixed(1)}`);
}

// ── pointer tracking ──────────────────────
let dragState  = null;  // { pointerId, startSVG, originXY }
let panState   = null;  // { pointerId, startSVG, startVB }
let pinchState = null;  // { startDist, startMidSVG, startVB }
const ptrs = new Map(); // pointerId → {x, y} in client space

function pinchInfo() {
  const [a, b] = [...ptrs.values()];
  return {
    dist: Math.hypot(b.x - a.x, b.y - a.y),
    mid:  { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }
  };
}

// Convert client coords → SVG coords using current viewBox + SVG rect
function toSVG(cx, cy) {
  const r = svg.getBoundingClientRect();
  return {
    x: vb.x + (cx - r.left) / r.width  * vb.w,
    y: vb.y + (cy - r.top)  / r.height * vb.h
  };
}

// ── styles injected into iframe ────────────
const CSS = `
html, body { touch-action: none; }
svg { touch-action: none; user-select: none; }
#__hud {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,16,10,0.97);
  border-top: 1px solid #253525;
  padding: 10px 14px 18px;
  font: 13px/1.4 monospace;
  color: #aaa;
  z-index: 9000;
  transform: translateY(100%);
  transition: transform 0.2s ease;
  touch-action: auto;
}
#__hud.open { transform: translateY(0); }
#__hud-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
#__hud-name { color: #7dc; font-size: 12px; letter-spacing: 0.03em; }
#__hud-close {
  background: none; border: none; color: #444;
  font-size: 22px; line-height: 1; cursor: pointer; padding: 0 2px;
}
#__hud-close:active { color: #aaa; }
.hr {
  display: flex; align-items: center; gap: 6px; margin-bottom: 9px;
}
.hr label { width: 14px; color: #4a6a48; font-size: 11px; flex-shrink: 0; }
.hr input[type=range] { flex: 1; accent-color: #5a9; height: 4px; }
.hr input[type=number] {
  width: 50px; background: #141c13; border: 1px solid #253525;
  color: #ccc; font: 11px monospace; padding: 4px 5px; border-radius: 2px;
  -moz-appearance: textfield;
}
.hr input[type=number]::-webkit-inner-spin-button { display: none; }
.nudge {
  background: #141c13; border: 1px solid #253525; color: #6a8a68;
  font: 10px monospace; padding: 4px 6px; border-radius: 2px;
  cursor: pointer; flex-shrink: 0; line-height: 1;
}
.nudge:active { background: #1e2e1c; color: #9dc; }
#__lock {
  background: #141c13; border: 1px solid #253525; color: #6a8a68;
  font: 10px monospace; padding: 5px 10px; border-radius: 2px;
  cursor: pointer; line-height: 1; margin-bottom: 9px;
}
#__lock.on { border-color: #5a9; color: #7dc; background: #0d1e14; }
#__hud-out {
  margin-top: 6px; font: 10px/1.7 monospace; color: #5a9;
  background: #0d140c; border: 1px solid #1e2e1c; border-radius: 2px;
  padding: 6px 8px; cursor: pointer; user-select: all; white-space: pre;
}
#__hud-out:hover { border-color: #3a5a40; }
#__pb {
  position: fixed; top: 14px; right: 14px;
  background: rgba(10,16,10,0.90); border: 1px solid #253525;
  color: #7dc; font: 15px monospace; padding: 8px 11px;
  border-radius: 4px; cursor: pointer; z-index: 9001; line-height: 1;
  touch-action: auto;
}
#__pb:active { background: #1a2418; }
#__pl {
  position: fixed; top: 52px; right: 14px;
  background: rgba(10,16,10,0.97); border: 1px solid #253525;
  border-radius: 4px; padding: 6px; z-index: 9001;
  display: flex; flex-direction: column; gap: 2px;
  min-width: 175px; display: none; touch-action: auto;
}
#__pl.open { display: flex; }
.pb {
  padding: 7px 10px; background: none;
  border: 1px solid transparent; border-radius: 2px;
  color: #556654; font: 11px monospace; text-align: left; cursor: pointer;
}
.pb:hover  { color: #aaa; border-color: #253525; }
.pb.active { color: #7dc; border-color: #3a5a50; background: #111e11; }
`;

// ── HUD HTML ───────────────────────────────
function buildHUD() {
  const rows = ['x','y','w','h'].flatMap((k, i) => {
    const row = `
    <div class="hr">
      <label>${k}</label>
      <input type="range" id="__s${k}" min="${RANGES[k][0]}" max="${RANGES[k][1]}" step="1">
      <input type="number" id="__n${k}">
      <button class="nudge" data-k="${k}" data-d="-10">−10</button>
      <button class="nudge" data-k="${k}" data-d="-1">−1</button>
      <button class="nudge" data-k="${k}" data-d="1">+1</button>
      <button class="nudge" data-k="${k}" data-d="10">+10</button>
    </div>`;
    return i === 1 ? [row, `<button id="__lock">⛓ lock ratio</button>`] : [row];
  }).join('');

  const picks = BUILDINGS.map(id =>
    `<button class="pb" data-id="${id}">${id}</button>`).join('');

  return `
    <div id="__hud">
      <div id="__hud-bar">
        <span id="__hud-name">—</span>
        <button id="__hud-close">×</button>
      </div>
      ${rows}
      <pre id="__hud-out">—</pre>
    </div>
    <button id="__pb">☰</button>
    <div id="__pl">${picks}</div>`;
}

// ── init on load ───────────────────────────
frame.addEventListener('load', () => {
  doc = frame.contentDocument;
  frame.contentWindow.openDialogue = () => {};
  svg = doc.querySelector('svg');

  const style = doc.createElement('style');
  style.textContent = CSS;
  doc.head.appendChild(style);

  const wrap = doc.createElement('div');
  wrap.innerHTML = buildHUD();
  while (wrap.firstChild) doc.body.appendChild(wrap.firstChild);

  // ── picker ─────────────────────────────
  const pb = doc.getElementById('__pb');
  const pl = doc.getElementById('__pl');
  pb.addEventListener('click', e => { e.stopPropagation(); pl.classList.toggle('open'); });
  doc.addEventListener('click', e => {
    if (!pb.contains(e.target) && !pl.contains(e.target)) pl.classList.remove('open');
  });
  pl.querySelectorAll('.pb').forEach(b =>
    b.addEventListener('click', () => { pick(b.dataset.id); pl.classList.remove('open'); }));

  // ── underlay controls ──────────────────
  const btnStyle = `background:rgba(10,16,10,0.90);border:1px solid #253525;color:#7dc;
    font:11px monospace;padding:7px 10px;border-radius:4px;cursor:pointer;z-index:9001;
    line-height:1;touch-action:auto;`;

  const utog = doc.createElement('button');
  utog.textContent = '◐ underlay';
  utog.style.cssText = `position:fixed;bottom:14px;right:14px;${btnStyle}`;
  doc.body.appendChild(utog);
  let ulVisible = true;
  utog.addEventListener('click', () => {
    const ul = doc.getElementById('underlay');
    ulVisible = !ulVisible;
    ul.setAttribute('opacity', ulVisible ? '0.4' : '0');
    utog.style.color = ulVisible ? '#7dc' : '#3a5a50';
  });

  const urot = doc.createElement('button');
  urot.textContent = '↻ flip';
  urot.style.cssText = `position:fixed;bottom:14px;right:120px;${btnStyle}`;
  doc.body.appendChild(urot);
  const TRANSFORMS = ['translate(55, 838) rotate(270)', 'translate(1205, 58) rotate(90)'];
  let rotIdx = 0;
  urot.addEventListener('click', () => {
    rotIdx = 1 - rotIdx;
    doc.querySelector('#underlay image').setAttribute('transform', TRANSFORMS[rotIdx]);
  });

  // ── HUD controls ───────────────────────
  doc.getElementById('__hud-close').addEventListener('click', closeHUD);

  const lockBtn = doc.getElementById('__lock');
  lockBtn.addEventListener('click', () => {
    arLocked = !arLocked;
    if (arLocked) arRatio = getVals().w / getVals().h;
    lockBtn.classList.toggle('on', arLocked);
  });

  function enforceRatio(changed) {
    if (!arLocked || !arRatio) return;
    if (changed === 'w') {
      const h = Math.round(+doc.getElementById('__nw').value / arRatio);
      doc.getElementById('__nh').value = h;
      doc.getElementById('__sh').value = h;
    } else if (changed === 'h') {
      const w = Math.round(+doc.getElementById('__nh').value * arRatio);
      doc.getElementById('__nw').value = w;
      doc.getElementById('__sw').value = w;
    }
  }

  ['x','y','w','h'].forEach(k => {
    const s = doc.getElementById('__s' + k);
    const n = doc.getElementById('__n' + k);
    s.addEventListener('input', () => { n.value = s.value; enforceRatio(k); apply(); });
    n.addEventListener('input', () => { s.value = n.value; enforceRatio(k); apply(); });
  });

  doc.querySelectorAll('.nudge').forEach(btn =>
    btn.addEventListener('click', () => {
      const k = btn.dataset.k;
      const n = doc.getElementById('__n' + k);
      n.value = +n.value + +btn.dataset.d;
      doc.getElementById('__s' + k).value = n.value;
      enforceRatio(k);
      apply();
    }));

  // ── building drag ──────────────────────
  BUILDINGS.forEach(id => {
    const el = doc.getElementById(id);
    if (!el) return;
    el.style.cursor = 'grab';

    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (ptrs.size >= 2) {
        // second finger: cancel drag, let SVG pointerdown start pinch
        dragState = null;
        return;
      }

      pick(id);
      dragState = {
        pointerId: e.pointerId,
        startSVG:  toSVG(e.clientX, e.clientY),
        originXY:  { x: getVals().x, y: getVals().y }
      };
    });
  });

  // ── pan + pinch on empty SVG ───────────
  svg.addEventListener('pointerdown', e => {
    ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (ptrs.size === 2) {
      dragState = null;
      panState  = null;
      const { dist, mid } = pinchInfo();
      pinchState = {
        startDist:   dist,
        startMidSVG: toSVG(mid.x, mid.y),
        startVB:     { ...vb }
      };
    } else if (!dragState) {
      panState = {
        pointerId:    e.pointerId,
        startClientX: e.clientX,
        startClientY: e.clientY,
        startVB:      { ...vb }
      };
    }
  });

  // ── pointermove: drag / pan / pinch ───
  doc.addEventListener('pointermove', e => {
    ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pinchState && ptrs.size >= 2) {
      const { dist, mid } = pinchInfo();
      const factor = pinchState.startDist / dist;
      const r      = svg.getBoundingClientRect();
      const newW   = pinchState.startVB.w * factor;
      const newH   = pinchState.startVB.h * factor;
      vb.w = newW;
      vb.h = newH;
      vb.x = pinchState.startMidSVG.x - (mid.x - r.left) / r.width  * newW;
      vb.y = pinchState.startMidSVG.y - (mid.y - r.top)  / r.height * newH;
      setVB();

    } else if (dragState && e.pointerId === dragState.pointerId && selected) {
      const p  = toSVG(e.clientX, e.clientY);
      const dx = p.x - dragState.startSVG.x;
      const dy = p.y - dragState.startSVG.y;
      if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
      selected.style.cursor = 'grabbing';
      const x = Math.round(dragState.originXY.x + dx);
      const y = Math.round(dragState.originXY.y + dy);
      doc.getElementById('__nx').value = x;
      doc.getElementById('__sx').value = x;
      doc.getElementById('__ny').value = y;
      doc.getElementById('__sy').value = y;
      apply();

    } else if (panState && e.pointerId === panState.pointerId) {
      const r = svg.getBoundingClientRect();
      vb.x = panState.startVB.x - (e.clientX - panState.startClientX) / r.width  * panState.startVB.w;
      vb.y = panState.startVB.y - (e.clientY - panState.startClientY) / r.height * panState.startVB.h;
      setVB();
    }
  });

  function cleanPointer(id) {
    ptrs.delete(id);
    if (dragState?.pointerId === id) {
      if (selected) selected.style.cursor = 'grab';
      dragState = null;
    }
    if (panState?.pointerId === id) panState = null;
    if (ptrs.size < 2) pinchState = null;
  }
  doc.addEventListener('pointerup',     e => cleanPointer(e.pointerId));
  doc.addEventListener('pointercancel', e => cleanPointer(e.pointerId));

  // ── scroll wheel zoom ─────────────────
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.12 : 0.89;
    const r = svg.getBoundingClientRect();
    const px = vb.x + (e.clientX - r.left) / r.width  * vb.w;
    const py = vb.y + (e.clientY - r.top)  / r.height * vb.h;
    vb.x = px + (vb.x - px) * factor;
    vb.y = py + (vb.y - py) * factor;
    vb.w *= factor;
    vb.h *= factor;
    setVB();
  }, { passive: false });
});

// ── select building ────────────────────────
function pick(id) {
  const el = doc.getElementById(id);
  if (!el) return;
  selected = el;

  doc.querySelectorAll('.pb').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id));

  const saved = el.getAttribute('transform') || '';
  el.removeAttribute('transform');
  origBox = el.getBBox();
  el.setAttribute('transform', saved);

  const { tx, ty, sx, sy } = parseTr(saved);
  const x = origBox.x * sx + tx;
  const y = origBox.y * sy + ty;
  const w = origBox.width  * sx;
  const h = origBox.height * sy;

  setVals({ x, y, w, h });
  doc.getElementById('__hud-name').textContent = id;
  drawSel(x, y, w, h);
  showOut(id, x, y, w, h);
  doc.getElementById('__hud').classList.add('open');
}

function closeHUD() {
  doc.getElementById('__hud').classList.remove('open');
  doc.querySelectorAll('.pb').forEach(b => b.classList.remove('active'));
  clearSel();
  selected = null;
}

// ── apply values → SVG transform ──────────
function apply() {
  if (!selected || !origBox) return;
  const { x, y, w, h } = getVals();
  const sx = w / origBox.width;
  const sy = h / origBox.height;
  const tx = x - origBox.x * sx;
  const ty = y - origBox.y * sy;
  let t = `translate(${tx.toFixed(1)}, ${ty.toFixed(1)})`;
  if (Math.abs(sx - 1) > 0.0005 || Math.abs(sy - 1) > 0.0005)
    t += ` scale(${sx.toFixed(4)}, ${sy.toFixed(4)})`;
  selected.setAttribute('transform', t);
  drawSel(x, y, w, h);
  showOut(selected.id, x, y, w, h);
}

// ── helpers ────────────────────────────────
function parseTr(t) {
  let tx=0, ty=0, sx=1, sy=1;
  const tm = t && t.match(/translate\(\s*([-\d.]+)[,\s]+([-\d.]+)/);
  if (tm) { tx=+tm[1]; ty=+tm[2]; }
  const s2 = t && t.match(/scale\(\s*([-\d.]+)[,\s]+([-\d.]+)/);
  if (s2) { sx=+s2[1]; sy=+s2[2]; }
  else { const s1 = t && t.match(/scale\(\s*([-\d.]+)/); if (s1) sx=sy=+s1[1]; }
  return { tx, ty, sx, sy };
}

function getVals() {
  return Object.fromEntries(['x','y','w','h'].map(k =>
    [k, +doc.getElementById('__n' + k).value]));
}

function setVals(v) {
  ['x','y','w','h'].forEach(k => {
    const r = Math.round(v[k]);
    doc.getElementById('__s' + k).value = r;
    doc.getElementById('__n' + k).value = r;
  });
  if (arLocked) arRatio = v.w / v.h;
}

function clearSel() {
  if (selRect) { selRect.remove(); selRect = null; }
}

function drawSel(x, y, w, h) {
  clearSel();
  selRect = doc.createElementNS('http://www.w3.org/2000/svg', 'rect');
  selRect.setAttribute('x',               x - 3);
  selRect.setAttribute('y',               y - 3);
  selRect.setAttribute('width',           w + 6);
  selRect.setAttribute('height',          h + 6);
  selRect.setAttribute('fill',            'none');
  selRect.setAttribute('stroke',          'rgba(100,220,160,0.75)');
  selRect.setAttribute('stroke-width',    '1.5');
  selRect.setAttribute('stroke-dasharray','5 3');
  selRect.setAttribute('pointer-events',  'none');
  svg.appendChild(selRect);
}

function showOut(id, x, y, w, h) {
  doc.getElementById('__hud-out').textContent =
    `id="${id}"  x ${Math.round(x)}  y ${Math.round(y)}  w ${Math.round(w)}  h ${Math.round(h)}`;
}
</script>
</body>
</html>
