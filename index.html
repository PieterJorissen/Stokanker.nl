<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stokanker</title>
  <style>
    body { margin: 0; background: #0d120b; color: #8ab888; font: 13px/1.8 monospace; padding: 2rem; }
    pre  { white-space: pre-wrap; }
  </style>
</head>
<body>
<pre id="out">loading…</pre>
<script type="module">
  import { buildWorldState } from './engine/world-state.js';
  try {
    const s = await buildWorldState();
    document.getElementById('out').textContent = JSON.stringify(s, null, 2);
  } catch(e) {
    document.getElementById('out').textContent = 'error: ' + e.message;
  }
</script>
</body>
</html>
