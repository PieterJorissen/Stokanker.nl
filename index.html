<script type="module">
import { buildWorldState } from './engine/world-state.js';
import { Dialogue }        from './engine/dialogue.js';
import { getFlags, activeUnlocks } from './engine/flags.js';

const INTERACTIVE = new Set([
  'romney-loods','fabriek','werkplaats','ons-huis',
  'schuur-complex','portal-crane','drijvende-bok','boomgaard','smalspoor-cart'
]);

function narratorLine(state) {
  if (state.shipsInPort.length) return 'A ship is in. The yard smells like rope and paint.';
  if (state.isWeekend)          return 'Weekend. Most doors are shut.';
  const h = +state.time.split(':')[0];
  if (h < 9)  return 'Early. The yard is just waking up.';
  if (h > 16) return 'Late afternoon. Things are wrapping up.';
  return 'Midday. The yard is working.';
}

const state   = await buildWorldState();
const flags   = getFlags();
const unlocks = await activeUnlocks();

const narratorEl = document.getElementById('narrator');
const unlockedLine = unlocks.map(u => u.grants?.narrator).filter(Boolean).at(-1);
narratorEl.textContent = unlockedLine ?? narratorLine(state);

// Apply open/closed classes only to interactive buildings
for (const zone of document.querySelectorAll('.zone')) {
  if (!INTERACTIVE.has(zone.id)) continue;
  zone.classList.add(state.openBuildings.includes(zone.id) ? 'open' : 'closed');
}

// Map click
document.getElementById('map').addEventListener('click', e => {
  const open   = e.target.closest('.zone.open');
  const closed = e.target.closest('.zone.closed');
  if (open   && INTERACTIVE.has(open.id))   { startDialogue(open.id); return; }
  if (closed && INTERACTIVE.has(closed.id)) { narratorEl.textContent = 'Closed. Come back during working hours.'; }
});

let currentDialogue = null;

async function startDialogue(buildingId) {
  let tree;
  try {
    tree = await fetch(`./content/conversations/${buildingId}.json`).then(r => {
      if (!r.ok) throw new Error('no conversation');
      return r.json();
    });
  } catch {
    showDialogueNode({
      type: 'narrate',
      text: 'The door is open. Nothing to discuss right now.',
      choices: [{ label: 'OK', next: 'end' }]
    }, null);
    return;
  }
  currentDialogue = new Dialogue(tree, state, flags, closeDialogue);
  document.getElementById('dialogue').removeAttribute('hidden');
  currentDialogue.start();
}

function closeDialogue() {
  document.getElementById('dialogue').setAttribute('hidden', '');
  currentDialogue = null;
}

document.addEventListener('dialogue-render', e => {
  const { node, engine } = e.detail;
  showDialogueNode(node, engine);
});

function showDialogueNode(node, engine) {
  const nameEl    = document.getElementById('dialogue-name');
  const textEl    = document.getElementById('dialogue-text');
  const choicesEl = document.getElementById('dialogue-choices');

  document.getElementById('dialogue').removeAttribute('hidden');

  nameEl.textContent = (node.type === 'narrate' || !engine?.tree?.npcName)
    ? '' : engine.tree.npcName;

  if (node.type === 'inventory') {
    textEl.textContent = node.fallback ?? '';
  } else {
    textEl.textContent = node.text ?? '';
  }

  choicesEl.innerHTML = '';
  for (let i = 0; i < (node.choices ?? []).length; i++) {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = node.choices[i].label;
    if (engine) {
      btn.addEventListener('click', () => engine.choose(i));
    } else {
      btn.addEventListener('click', closeDialogue);
    }
    choicesEl.appendChild(btn);
  }
}
</script>
</body>
</html>
